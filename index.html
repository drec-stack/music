<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SONUS | Professional Audio Interface</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-bg: #030303;
            --color-surface: rgba(18, 18, 18, 0.75);
            --color-surface-light: rgba(30, 30, 30, 0.65);
            --color-accent: #8b5cf6;
            --color-accent-glow: rgba(139, 92, 246, 0.3);
            --color-text-main: #ffffff;
            --color-text-secondary: #a1a1aa;
            --color-text-muted: #52525b;
            --color-border: rgba(255, 255, 255, 0.06);
            
            --radius-md: 12px;
            --radius-lg: 24px;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            cursor: default;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text-main);
            overflow: hidden;
            height: 100vh;
        }

        /* --- LIQUID BACKGROUND --- */
        .liquid-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            filter: blur(100px);
            background: var(--color-bg);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
            opacity: 0.4;
            animation: float-liquid infinite alternate;
            will-change: transform;
        }

        .blob-1 { width: 60vw; height: 60vw; background: #3b0764; top: -10%; left: -10%; animation-duration: 25s; }
        .blob-2 { width: 50vw; height: 50vw; background: #1e3a8a; bottom: -10%; right: -10%; animation-duration: 30s; }
        .blob-3 { width: 40vw; height: 40vw; background: #581c87; top: 30%; left: 40%; animation-duration: 20s; }

        @keyframes float-liquid {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10vw, 10vh) scale(1.2); }
        }

        .bg-dimmer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* --- APP SHELL --- */
        .app-container {
            display: grid;
            grid-template-columns: 260px 1fr;
            grid-template-rows: 1fr 100px;
            height: 100vh;
            position: relative;
        }

        .sidebar {
            background: var(--color-surface);
            -webkit-backdrop-filter: blur(60px);
            backdrop-filter: blur(60px);
            border-right: 1px solid var(--color-border);
            padding: 32px 20px;
            display: flex;
            flex-direction: column;
            gap: 48px;
            z-index: 10;
        }

        .brand {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.8px;
            padding-left: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .brand .dot { width: 6px; height: 6px; background: var(--color-accent); border-radius: 50%; }

        .nav-group { display: flex; flex-direction: column; gap: 8px; }
        .nav-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--color-text-muted);
            letter-spacing: 1.2px;
            margin: 0 12px 12px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--color-text-secondary);
            font-size: 14px;
            font-weight: 500;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            transition: var(--transition-smooth);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-link:hover { color: var(--color-text-main); background: var(--color-surface-light); }
        .nav-link.active { background: var(--color-accent); color: var(--color-text-main); box-shadow: 0 8px 20px var(--color-accent-glow); }

        .main-content {
            overflow-y: auto;
            padding: 0 40px 110px;
            scrollbar-width: none;
        }
        .main-content::-webkit-scrollbar { display: none; }

        .top-header {
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
        }

        .search-box {
            width: 380px;
            background: var(--color-surface-light);
            border: 1px solid var(--color-border);
            padding: 12px 20px;
            border-radius: 16px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: var(--transition-smooth);
        }

        .search-box:focus { border-color: var(--color-accent); background: var(--color-surface); }

        .profile-chip {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: var(--color-surface-light);
            border: 1px solid var(--color-border);
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-accent), #c084fc);
        }

        /* --- PROFESSIONAL TRACK LIST --- */
        .section-label {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .track-list-header {
            display: grid;
            grid-template-columns: 40px 1fr 200px 150px 80px;
            padding: 0 16px 8px;
            border-bottom: 1px solid var(--color-border);
            color: var(--color-text-muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .track-row {
            display: grid;
            grid-template-columns: 40px 1fr 200px 150px 80px;
            align-items: center;
            padding: 8px 16px;
            border-radius: var(--radius-md);
            transition: var(--transition-smooth);
            cursor: pointer;
            gap: 16px;
        }

        .track-row:hover {
            background: var(--color-surface-light);
        }

        .track-number {
            color: var(--color-text-muted);
            font-size: 14px;
            font-weight: 500;
            position: relative;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
        }

        .play-icon-hover {
            position: absolute;
            opacity: 0;
            transform: scale(0.8);
            transition: var(--transition-smooth);
            pointer-events: none;
        }

        .track-row:hover .track-number { color: transparent; }
        .track-row:hover .play-icon-hover { opacity: 1; transform: scale(1); }

        .track-main {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .track-thumb {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
        }

        .track-details .title {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text-main);
            margin-bottom: 2px;
        }

        .track-details .artist {
            font-size: 13px;
            color: var(--color-text-secondary);
        }

        .track-album, .track-date {
            font-size: 14px;
            color: var(--color-text-secondary);
        }

        .track-duration {
            font-size: 14px;
            color: var(--color-text-secondary);
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        /* --- PLAYER BAR --- */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100px;
            background: rgba(10, 10, 10, 0.85);
            -webkit-backdrop-filter: blur(40px);
            backdrop-filter: blur(40px);
            border-top: 1px solid var(--color-border);
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            align-items: center;
            padding: 0 32px;
            z-index: 1000;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .now-img {
            width: 60px;
            height: 60px;
            border-radius: var(--radius-md);
            object-fit: cover;
        }

        .now-details h4 { font-size: 14px; font-weight: 600; }
        .now-details p { font-size: 12px; color: var(--color-text-secondary); }

        .controls-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .playback-btns {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .btn-ctrl {
            background: none;
            border: none;
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-ctrl:hover { color: var(--color-text-main); transform: scale(1.1); }

        .btn-main-play {
            width: 44px;
            height: 44px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-smooth);
            border: none;
        }

        .btn-main-play:hover { transform: scale(1.1); background: var(--color-accent); }
        .btn-main-play svg { fill: black; transition: var(--transition-smooth); }
        .btn-main-play:hover svg { fill: white; }

        .progress-wrap {
            width: 480px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-track {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            width: 40%;
            height: 100%;
            background: var(--color-accent);
            border-radius: 2px;
        }

        .time-stamp { font-size: 11px; color: var(--color-text-muted); font-weight: 500; }

        .volume-ctrl {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
        }

        .vol-bar {
            width: 90px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        .vol-fill { width: 60%; height: 100%; background: var(--color-text-secondary); border-radius: 2px; }

        .reveal { animation: fadeInUp 0.8s cubic-bezier(0.2, 1, 0.3, 1) forwards; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

<div class="liquid-canvas">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>
<div class="bg-dimmer"></div>

<div class="app-container">
    <aside class="sidebar">
        <div class="brand">SONUS<div class="dot"></div></div>
        <div class="nav-group">
            <div class="nav-label">Меню</div>
            <a class="nav-link active" onclick="switchTab(this, 'home')">Главная</a>
            <a class="nav-link" onclick="switchTab(this, 'explore')">Обзор</a>
            <a class="nav-link" onclick="switchTab(this, 'library')">Библиотека</a>
        </div>
        <div class="nav-group">
            <div class="nav-label">Коллекции</div>
            <a class="nav-link">Ночной город</a>
            <a class="nav-link">Deep Focus</a>
            <a class="nav-link">Synthwave 84</a>
            <a class="nav-link">Lo-Fi Study</a>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-header">
            <input type="text" class="search-box" placeholder="Поиск треков, артистов..." oninput="filterMusic()">
            <div class="profile-chip">
                <div class="avatar"></div>
                <div style="text-align: right">
                    <div style="font-size: 13px; font-weight: 600;">Александр В.</div>
                    <div style="font-size: 10px; color: var(--color-text-muted);">Ultra HD Plan</div>
                </div>
            </div>
        </div>

        <div id="page-content">
            <div class="section-label reveal">Популярное сейчас</div>
            
            <!-- Заголовок списка -->
            <div class="track-list-header reveal" style="animation-delay: 0.1s;">
                <div>№</div>
                <div>Трек</div>
                <div>Альбом</div>
                <div>Дата добавления</div>
                <div style="text-align: right;">⏳</div>
            </div>

            <!-- Список треков -->
            <div id="music-list">
                <!-- Generated by JS -->
            </div>
        </div>
    </main>

    <footer class="player-bar">
        <div class="now-playing">
            <img src="" class="now-img" id="now-img">
            <div class="now-details">
                <h4 id="now-title">Выберите трек</h4>
                <p id="now-artist">Слушайте в высоком качестве</p>
            </div>
        </div>

        <div class="controls-center">
            <div class="playback-btns">
                <button class="btn-ctrl">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6l-8.5 6z"/></svg>
                </button>
                <button class="btn-main-play" id="play-btn" onclick="togglePlay()">
                    <svg id="play-svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button class="btn-ctrl">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>
            <div class="progress-wrap">
                <span class="time-stamp" id="curr-time">0:00</span>
                <div class="progress-track" onclick="seek(event)">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <span class="time-stamp" id="dur-time">0:00</span>
            </div>
        </div>

        <div class="volume-ctrl">
            <button class="btn-ctrl">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9l9-7 9 7v18l-9-7-9 7V9zm14 2.5V11h-2v-1.5h-2v1.5H7v-1.5H9V8.5h2v1.5h2V8.5h2v1.5z"/></svg>
            </button>
            <div class="vol-bar">
                <div class="vol-fill"></div>
            </div>
        </div>
    </footer
</div>

<script>
    const musicDB = [
        { id: 1, title: "After Hours", artist: "The Weeknd", album: "After Hours", date: "2 окт 2023", duration: "6:01", img: "https://images.unsplash.com/photo-1614613535308-a7f079df21f5?w=100" },
        { id: 2, title: "Solaris", artist: "FKJ", album: "Solis", date: "15 сен 2023", duration: "4:20", img: "https://images.unsplash.com/photo-1459749411177-041224656704?w=100" },
        { id: 3, title: "Neon Nights", artist: "Kavinsky", album: "OutRun", date: "11 авг 2023", duration: "3:45", img: "https://images.unsplash.com/photo-1493225255267-535b69a5a7a9?w=100" },
        { id: 4, title: "Quiet Morning", artist: "Hozier", album: "Unreal Unearth", date: "20 июл 2023", duration: "5:12", img: "https://images.unsplash.com/photo-1514525231468-155d17a27aee?w=100" },
        { id: 5, title: "Electric Love", artist: "Dua Lipa", album: "Future Nostalgia", date: "10 июн 2023", duration: "3:28", img: "https://images.unsplash.com/photo-1508718860336-f75bc6f52212?w=100" },
        { id: 6, title: "Deep Blue", artist: "Ambient Soul", album: "Oceania", date: "5 май 2023", duration: "7:05", img: "https://images.unsplash.com/photo-1511671782729-a0fb7a95bac7?w=100" },
        { id: 7, title: "Urban Pulse", artist: "Kaytranada", album: "Bubba", date: "12 апр 2023", duration: "4:10", img: "https://images.unsplash.com/photo-1470225620780-dba4eeb65739?w=100" },
        { id: 8, title: "Velvet Rain", artist: "Lana Del Rey", album: "Honeymoon", date: "3 мар 2023", duration: "4:50", img: "https://images.unsplash.com/photo-1505740420996-2002ff3e3ad1?w=100" },
    ];

    let isPlaying = false;
    let timer = null;
    let timeSeconds = 0;

    function init() {
        renderMusic(musicDB);
    }

    function renderMusic(data) {
        const list = document.getElementById('music-list');
        list.innerHTML = data.map((track, index) => `
            <div class="track-row reveal" style="animation-delay: ${0.2 + (index * 0.05)}s" onclick="playTrack(${track.id})">
                <div class="track-number">
                    ${index + 1}
                    <div class="play-icon-hover">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                </div>
                <div class="track-main">
                    <img src="${track.img}" class="track-thumb">
                    <div class="track-details">
                        <div class="title">${track.title}</div>
                        <div class="artist">${track.artist}</div>
                    </div>
                </div>
                <div class="track-album">${track.album}</div>
                <div class="track-date">${track.date}</div>
                <div class="track-duration">${track.duration}</div>
            </div>
        `).join('');
    }

    function filterMusic() {
        const query = document.querySelector('.search-box').value.toLowerCase();
        const filtered = musicDB.filter(t => t.title.toLowerCase().includes(query) || t.artist.toLowerCase().includes(query));
        renderMusic(filtered);
    }

    function playTrack(id) {
        const track = musicDB.find(t => t.id === id);
        document.getElementById('now-img').src = track.img;
        document.getElementById('now-title').innerText = track.title;
        document.getElementById('now-artist').innerText = track.artist;
        isPlaying = true;
        updatePlayButton(true);
        startTimer();
    }

    function togglePlay() {
        isPlaying = !isPlaying;
        updatePlayButton(isPlaying);
        if(!isPlaying) clearInterval(timer);
        else startTimer();
    }

    function updatePlayButton(playing) {
        const svg = document.getElementById('play-svg');
        svg.innerHTML = playing 
            ? '<path d="M6 19h2V5h-2v14zm8 0h2V5h-2v14z"/>' 
            : '<path d="M8 5v14l11-7z"/>';
    }

    function startTimer() {
        clearInterval(timer);
        timer = setInterval(() => {
            timeSeconds++;
            updateProgress();
        }, 1000);
    }

    function updateProgress() {
        const duration = 210;
        const percent = (timeSeconds / duration) * 100;
        document.getElementById('progress-fill').style.width = `${percent}%`;
        const m = Math.floor(timeSeconds / 60);
        const s = timeSeconds % 60;
        document.getElementById('curr-time').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        document.getElementById('dur-time').innerText = `3:30`;
    }

    function seek(e) {
        const rect = e.target.getBoundingClientRect();
        timeSeconds = Math.floor(((e.clientX - rect.left) / rect.width) * 210);
        updateProgress();
    }

    function switchTab(el, tab) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        const content = document.getElementById('page-content');
        if(tab !== 'home') {
            content.innerHTML = `<div class="reveal" style="text-align:center; margin-top: 120px;">
                <h1 style="font-size: 32px; margin-bottom: 12px;">${tab === 'explore' ? 'Исследование' : 'Библиотека'}</h1>
                <p style="color: var(--color-text-secondary);">Данный модуль находится в стадии разработки</p>
            </div>`;
        } else {
            location.reload();
        }
    }

    window.onload = init;
</script>
</body>
</html>
