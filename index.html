<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONUS | High-Fidelity Audio Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050505;
            --bg-surface: rgba(15, 15, 15, 0.7);
            --bg-elevated: rgba(26, 26, 26, 0.6);
            --accent: #7c3aed;
            --accent-bright: #a78bfa;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --transition-smooth: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        /* --- LIQUID BACKGROUND SYSTEM --- */
        .liquid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(80px);
            overflow: hidden;
            background: var(--bg-deep);
        }

        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            opacity: 0.4;
            mix-blend-mode: screen;
            animation: move-blob infinite alternate;
        }

        .blob-1 {
            background: #4c1d95;
            top: -10%;
            left: -10%;
            animation-duration: 20s;
        }

        .blob-2 {
            background: #1e3a8a;
            bottom: -10%;
            right: -10%;
            animation-duration: 25s;
            animation-delay: -5s;
        }

        .blob-3 {
            background: #5b21b6;
            top: 40%;
            left: 30%;
            animation-duration: 30s;
            animation-delay: -2s;
        }

        .blob-4 {
            background: #1e1b4b;
            bottom: 20%;
            left: 10%;
            animation-duration: 22s;
            animation-delay: -10s;
        }

        @keyframes move-blob {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30vw, 20vh) scale(1.2); }
            66% { transform: translate(-10vw, 40vh) scale(0.8); }
            100% { transform: translate(10vw, -10vh) scale(1.1); }
        }

        /* Overlay to keep content readable */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
            pointer-events: none;
        }

        /* --- APP LAYOUT --- */
        .app-shell {
            display: grid;
            grid-template-columns: 280px 1fr;
            grid-template-rows: 1fr 110px;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        .sidebar {
            background: rgba(5, 5, 5, 0.4);
            backdrop-filter: blur(40px);
            padding: 32px 20px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            border-right: 1px solid var(--glass-border);
        }

        .brand {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-primary);
            padding-left: 12px;
        }
        .brand span { color: var(--accent); }

        .nav-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin: 0 12px 12px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            padding: 12px 16px;
            border-radius: 12px;
            transition: var(--transition-smooth);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-link.active {
            color: var(--text-primary);
            background: var(--accent);
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }

        .main-view {
            overflow-y: auto;
            padding: 0 40px 120px;
            scrollbar-width: none;
        }

        .main-view::-webkit-scrollbar { display: none; }

        .top-bar {
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(15px);
        }

        .search-input {
            width: 400px;
            background: var(--bg-elevated);
            border: 1px solid var(--glass-border);
            padding: 14px 20px;
            border-radius: 16px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: var(--transition-smooth);
            backdrop-filter: blur(10px);
        }

        .search-input:focus {
            border-color: var(--accent);
            background: var(--bg-surface);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
        }

        .user-chip {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 16px;
            background: var(--bg-surface);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition-smooth);
            backdrop-filter: blur(10px);
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--accent), var(--accent-bright));
        }

        .hero {
            height: 320px;
            border-radius: 24px;
            background: linear-gradient(to right, rgba(0,0,0,0.8), transparent), 
                        url('https://images.unsplash.com/photo-1493225255267-535b69a5a7a9?w=1200');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 40px;
            margin-bottom: 40px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .hero-title {
            font-size: 42px;
            font-weight: 800;
            max-width: 500px;
            line-height: 1.1;
            margin-bottom: 24px;
        }

        .hero-btn {
            width: fit-content;
            padding: 14px 28px;
            background: var(--text-primary);
            color: black;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .hero-btn:hover { transform: scale(1.05); background: var(--accent-bright); color: white; }

        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }

        .filter-pill {
            padding: 8px 20px;
            background: var(--bg-elevated);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition-smooth);
            backdrop-filter: blur(10px);
        }

        .filter-pill.active {
            background: var(--text-primary);
            color: black;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
        }

        .track-card {
            background: var(--bg-surface);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            transition: var(--transition-smooth);
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .track-card:hover {
            background: var(--bg-elevated);
            transform: translateY(-8px);
            border-color: rgba(255,255,255,0.2);
        }

        .img-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .track-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition-smooth);
        }

        .track-card:hover .track-img { transform: scale(1.1); }

        .play-overlay {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(10px);
            transition: var(--transition-smooth);
        }

        .track-card:hover .play-overlay { opacity: 1; transform: translateY(0); }

        .track-info h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .track-info p { font-size: 14px; color: var(--text-secondary); }

        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 110px;
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(40px);
            border-top: 1px solid var(--glass-border);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-items: center;
            padding: 0 32px;
            z-index: 1000;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .now-img {
            width: 64px;
            height: 64px;
            border-radius: 12px;
        }

        .now-details h4 { font-size: 14px; font-weight: 600; }
        .now-details p { font-size: 12px; color: var(--text-secondary); }

        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .ctrl-btns {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .btn-action {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition-smooth);
            font-size: 18px;
        }

        .btn-action:hover { color: var(--text-primary); }

        .btn-play-main {
            width: 48px;
            height: 48px;
            background: var(--text-primary);
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .btn-play-main:hover { transform: scale(1.1); background: var(--accent-bright); color: white; }

        .playback-slider {
            width: 450px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .progress-bg {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .progress-fill {
            width: 35%;
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
        }

        .time { font-size: 12px; color: var(--text-muted); }

        .volume-group {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
        }

        .vol-slider {
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        .vol-fill { width: 70%; height: 100%; background: var(--text-secondary); border-radius: 2px; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-up { animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }

    </style>
</head>
<body>

<!-- Liquid Background -->
<div class="liquid-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
</div>
<div class="bg-overlay"></div>

<div class="app-shell">
    <aside class="sidebar">
        <div class="brand">SONUS<span>.</span></div>
        
        <div class="nav-section">
            <div class="nav-label">Меню</div>
            <a class="nav-link active" onclick="switchTab(this, 'home')">Главная</a>
            <a class="nav-link" onclick="switchTab(this, 'explore')">Обзор</a>
            <a class="nav-link" onclick="switchTab(this, 'library')">Библиотека</a>
        </div>

        <div class="nav-section">
            <div class="nav-label">Ваши плейлисты</div>
            <a class="nav-link">Ночной город</a>
            <a class="nav-link">Deep Focus</a>
            <a class="nav-link">Техно-драйв</a>
            <a class="nav-link">Chill Out</a>
        </div>
    </aside>

    <main class="main-view" id="main-view">
        <div class="top-bar">
            <div class="search-container">
                <input type="text" class="search-input" id="search-box" placeholder="Поиск треков, артистов..." oninput="filterMusic()">
            </div>
            <div class="user-chip">
                <div class="avatar"></div>
                <div style="text-align: right">
                    <div style="font-size: 13px; font-weight: 600;">Александр В.</div>
                    <div style="font-size: 10px; color: var(--text-muted);">Premium Plan</div>
                </div>
            </div>
        </div>

        <div id="page-content">
            <div class="hero animate-up">
                <div style="font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--accent-bright); margin-bottom: 12px;">Рекомендация недели</div>
                <h1 class="hero-title">Погружение в атмосферу нео-синтетики</h1>
                <div class="hero-btn">Слушать сейчас</div>
            </div>

            <div class="filter-bar animate-up" style="animation-delay: 0.1s;">
                <div class="filter-pill active" onclick="filterGenre('all', this)">Все</div>
                <div class="filter-pill" onclick="filterGenre('electronic', this)">Electronic</div>
                <div class="filter-pill" onclick="filterGenre('ambient', this)">Ambient</div>
                <div class="filter-pill" onclick="filterGenre('pop', this)">Pop</div>
                <div class="filter-pill" onclick="filterGenre('jazz', this)">Jazz</div>
            </div>

            <div class="section-header animate-up" style="animation-delay: 0.2s; margin-bottom: 24px;">
                <h2 style="font-size: 24px; font-weight: 700;">Популярные треки</h2>
            </div>
            <div class="grid" id="music-grid">
                <!-- Generated by JS -->
            </div>
        </div>
    </main>

    <footer class="player-bar">
        <div class="now-playing">
            <img src="" class="now-img" id="now-img" alt="">
            <div class="now-details">
                <h4 id="now-title">Выберите трек</h4>
                <p id="now-artist">Слушайте лучшую музыку</p>
            </div>
        </div>

        <div class="player-controls">
            <div class="ctrl-btns">
                <button class="btn-action">⏮</button>
                <button class="btn-play-main" id="play-btn" onclick="togglePlay()">▶</button>
                <button class="btn-action">⏭</button>
            </div>
            <div class="playback-slider">
                <span class="time" id="curr-time">0:00</span>
                <div class="progress-bg" onclick="seek(event)">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <span class="time" id="dur-time">0:00</span>
            </div>
        </div>

        <div class="volume-group">
            <button class="btn-action" style="font-size: 14px;">🔊</button>
            <div class="vol-slider">
                <div class="vol-fill"></div>
            </div>
        </div>
    </footer
</div>

<script>
    const musicDB = [
        { id: 1, title: "Nightcity Drive", artist: "Kavinsky", genre: "electronic", img: "https://images.unsplash.com/photo-1614613535308-a7f079df21f5?w=300" },
        { id: 2, title: "Solar Echoes", artist: "FKJ", genre: "ambient", img: "https://images.unsplash.com/photo-1459749411177-041224656704?w=300" },
        { id: 3, title: "Midnight City", artist: "M83", genre: "electronic", img: "https://images.unsplash.com/photo-1493225255267-535b69a5a7a9?w=300" },
        { id: 4, title: "Golden Hour", artist: "Knafu", genre: "jazz", img: "https://images.unsplash.com/photo-1514525231468-155d17a27aee?w=300" },
        { id: 5, title: "Neon Lights", artist: "The Weeknd", genre: "pop", img: "https://images.unsplash.com/photo-1508718860336-f75bc6f52212?w=300" },
        { id: 6, title: "Deep Ocean", artist: "Hozier", genre: "ambient", img: "https://images.unsplash.com/photo-1511671782729-a0fb7a95bac7?w=300" },
        { id: 7, title: "Urban Flow", artist: "Kaytranada", genre: "electronic", img: "https://images.unsplash.com/photo-1470225620780-dba4eeb65739?w=300" },
        { id: 8, title: "Velvet Sky", artist: "Lana Del Rey", genre: "pop", img: "https://images.unsplash.com/photo-1505740420996-2002ff3e3ad1?w=300" },
    ];

    let isPlaying = false;
    let timer = null;
    let timeSeconds = 0;

    function init() {
        renderMusic(musicDB);
    }

    function renderMusic(data) {
        const grid = document.getElementById('music-grid');
        grid.innerHTML = data.map(track => `
            <div class="track-card animate-up" onclick="playTrack(${track.id})">
                <div class="img-container">
                    <img src="${track.img}" class="track-img">
                    <div class="play-overlay">▶</div>
                </div>
                <div class="track-info">
                    <h3>${track.title}</h3>
                    <p>${track.artist}</p>
                </div>
            </div>
        `).join('');
    }

    function filterMusic() {
        const query = document.getElementById('search-box').value.toLowerCase();
        const filtered = musicDB.filter(t => t.title.toLowerCase().includes(query) || t.artist.toLowerCase().includes(query));
        renderMusic(filtered);
    }

    function filterGenre(genre, element) {
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        element.classList.add('active');
        if(genre === 'all') renderMusic(musicDB);
        else renderMusic(musicDB.filter(t => t.genre === genre));
    }

    function playTrack(id) {
        const track = musicDB.find(t => t.id === id);
        document.getElementById('now-img').src = track.img;
        document.getElementById('now-title').innerText = track.title;
        document.getElementById('now-artist').innerText = track.artist;
        isPlaying = true;
        document.getElementById('play-btn').innerText = '⏸';
        startTimer();
    }

    function togglePlay() {
        isPlaying = !isPlaying;
        document.getElementById('play-btn').innerText = isPlaying ? '⏸' : '▶';
        if(!isPlaying) clearInterval(timer);
        else startTimer();
    }

    function startTimer() {
        clearInterval(timer);
        timer = setInterval(() => {
            timeSeconds++;
            updateProgress();
        }, 1000);
    }

    function updateProgress() {
        const duration = 210;
        const percent = (timeSeconds / duration) * 100;
        document.getElementById('progress-fill').style.width = `${percent}%`;
        const m = Math.floor(timeSeconds / 60);
        const s = timeSeconds % 60;
        document.getElementById('curr-time').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        document.getElementById('dur-time').innerText = `3:30`;
    }

    function seek(e) {
        const rect = e.target.getBoundingClientRect();
        const x = e.clientX - rect.left;
        timeSeconds = Math.floor((x / rect.width) * 210);
        updateProgress();
    }

    function switchTab(el, tab) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        const content = document.getElementById('page-content');
        if(tab !== 'home') {
            content.innerHTML = `<div class="animate-up" style="text-align:center; margin-top: 100px;">
                <h1 style="font-size: 32px; margin-bottom: 12px;">${tab === 'explore' ? 'Исследование' : 'Библиотека'}</h1>
                <p style="color: var(--text-secondary);">Контент данной секции находится в разработке</p>
            </div>`;
        } else {
            location.reload();
        }
    }

    window.onload = init;
</script>
</body>
</html>
