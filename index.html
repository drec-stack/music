<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Music</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="navbar">
        <div class="container">
            <a href="#" class="logo">Aura Music</a>
            <nav class="menu">
                <ul>
                    <li><a href="#home" onclick="showSection('home')">Главная</a></li>
                    <li><a href="#browse" onclick="showSection('browse')">Обзор</a></li>
                    <li><a href="#library" onclick="showSection('library')">Библиотека</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section id="home" class="hero">
        <div class="container">
            <h1>Новые горизонты звука</h1>
            <p>Погрузитесь в персонализированные подборки, созданные специально для вас на основе ваших предпочтений.</p>
            <a href="#" class="btn">Слушать сейчас</a>
        </div>
    </section>

    <section id="browse" class="grid-section">
        <div class="container">
            <h2>Популярное сейчас</h2>
            <div class="grid" id="popular-tracks"></div>
        </div>
    </section>

    <section id="library" class="library-section">
        <div class="container">
            <h2>Библиотека музыки</h2>
            <input type="text" id="search-input" placeholder="Поиск...">
            <div class="grid" id="library-grid"></div>
        </div>
    </section>

    <footer class="player-bar">
        <div class="container">
            <div class="current-track">
                <img src="" alt="track-thumb" class="track-thumb">
                <div>
                    <span id="track-title">New Tune</span>
                    <small id="track-artist">Artist X</small>
                </div>
            </div>
            <div class="player-controls">
                <button onclick="prevTrack()">&#9604;</button>
                <button onclick="playPauseTrack()">&#10872;</button>
                <button onclick="nextTrack()">&#9605;</button>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="volume-controls">
                <button onclick="decreaseVolume()">&#128264;</button>
                <input type="range" class="volume-slider" min="0" max="100" value="50">
                <button onclick="increaseVolume()">&#128265;</button>
            </div>
        </div>
    </footer>

    <script src="scripts.js"></script>

</body>
</html>
