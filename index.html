<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Music AI | Pro Max UI</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        /* Glassmorphism Core */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Gradient Border Effect */
        .gradient-border {
            position: relative;
            border-radius: 1.5rem;
            padding: 1px; /* Thickness of border */
            background: linear-gradient(to right, #818cf8, #c084fc, #fb7185);
            transition: all 0.3s ease;
        }

        .gradient-border:hover {
            background: linear-gradient(to right, #fb7185, #c084fc, #818cf8);
            box-shadow: 0 0 20px rgba(192, 132, 252, 0.4);
        }

        /* Spring Animation */
        @keyframes springIn {
            0% { transform: scale(0.8); opacity: 0; }
            70% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-spring {
            animation: springIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Hover Scaling */
        .hover-scale {
            transition: transform 0.3s cubic-bezier(0.34, 1.53, 0.69, 1);
        }
        .hover-scale:hover {
            transform: scale(1.05);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Components ---

        const Icon = ({ name, className = "w-5 h-5" }) => {
            return <i data-lucide={name} className={className}></i>;
        };

        const GlassCard = ({ children, className = "", delay = 0 }) => {
            return (
                <div 
                    className={`gradient-border animate-spring hover-scale ${className}`} 
                    style={{ animationDelay: `${delay}ms` }}
                >
                    <div className="glass rounded-[1.4rem] p-5 h-full w-full">
                        {children}
                    </div>
                </div>
            );
        };

        const SidebarItem = ({ icon, label, active = false }) => (
            <div className={`flex items-center gap-4 px-4 py-3 rounded-xl cursor-pointer transition-all duration-300 ${active ? 'bg-white/20 text-white shadow-lg' : 'text-gray-400 hover:bg-white/10 hover:text-white'}`}>
                <Icon name={icon} />
                <span className="font-medium">{label}</span>
            </div>
        );

        const TrackCard = ({ title, artist, cover, delay }) => (
            <GlassCard delay={delay} className="w-48">
                <div className="relative group cursor-pointer">
                    <img src={cover} className="w-full aspect-square object-cover rounded-xl mb-4 shadow-lg" />
                    <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black/40 rounded-xl">
                        <div className="bg-white text-black p-3 rounded-full shadow-xl scale-75 group-hover:scale-100 transition-transform duration-300">
                            <Icon name="play" className="fill-current" />
                        </div>
                    </div>
                </div>
                <h3 className="font-semibold truncate">{title}</h3>
                <p className="text-sm text-gray-400 truncate">{artist}</p>
            </GlassCard>
        );

        // --- Main App ---

        const App = () => {
            const [currentTrack, setCurrentTrack] = useState({ title: "Midnight City", artist: "M83" });

            useEffect(() => {
                lucide.createIcons();
            }, []);

            return (
                <div className="flex h-screen w-full p-4 gap-4 overflow-hidden">
                    
                    {/* Sidebar */}
                    <aside className="w-64 glass rounded-3xl p-6 flex flex-col gap-8">
                        <div className="flex items-center gap-3 px-2">
                            <div className="w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center">
                                <Icon name="music" className="w-5 h-5 text-white" />
                            </div>
                            <h1 className="text-xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">
                                AURA AI
                            </h1>
                        </div>

                        <nav className="flex flex-col gap-2">
                            <p className="text-xs font-bold text-gray-500 uppercase px-4 mb-2">Меню</p>
                            <SidebarItem icon="home" label="Главная" active />
                            <SidebarItem icon="search" label="Поиск" />
                            <SidebarItem icon="library" label="Библиотека" />
                            <SidebarItem icon="user" label="Профиль" />
                        </nav>

                        <div className="mt-auto">
                            <div className="gradient-border p-[1px] rounded-2xl">
                                <div className="glass rounded-[15px] p-4 text-center">
                                    <p className="text-xs text-gray-300 mb-3">AI-Подбор активен</p>
                                    <button className="w-full py-2 bg-white text-indigo-900 rounded-lg font-bold text-sm hover:bg-indigo-100 transition-colors">
                                        Обновить поток
                                    </button>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 overflow-y-auto glass rounded-3xl p-8 relative">
                        <div className="flex justify-between items-center mb-10">
                            <h2 className="text-4xl font-extrabold animate-spring" style={{ animationDelay: '100ms' }}>
                                Добро пожаловать <span className="text-indigo-400">, Alex</span> 👋
                            </h2>
                            <div className="flex gap-3">
                                <div className="glass px-4 py-2 rounded-full flex items-center gap-2 text-sm border-white/10">
                                    <Icon name="search" className="w-4 h-4" />
                                    <input type="text" placeholder="Поиск музыки..." className="bg-transparent outline-none w-32" />
                                </div>
                                <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-500 to-pink-500 border-2 border-white/20 cursor-pointer hover-scale" />
                            </div>
                        </div>

                        {/* AI Section */}
                        <section className="mb-12">
                            <div className="flex items-center gap-2 mb-6">
                                <Icon name="sparkles" className="text-yellow-400" />
                                <h3 className="text-2xl font-bold">Сгенерировано ИИ для вас</h3>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                <div className="gradient-border rounded-3xl p-1 col-span-full lg:col-span-1">
                                    <div className="glass rounded-[23px] p-6 h-full flex flex-col justify-between bg-gradient-to-br from-indigo-500/20 to-transparent">
                                        <div>
                                            <h4 className="text-xl font-bold mb-2">Интеллектуальный поток</h4>
                                            <p className="text-gray-400 text-sm">Мы проанализировали ваши плейлисты и подобрали 24 новых трека в стиле Synthwave.</p>
                                        </div>
                                        <button className="mt-6 flex items-center justify-center gap-2 py-3 bg-white text-indigo-900 rounded-xl font-bold hover:scale-105 transition-transform">
                                            <Icon name="play" className="fill-current" /> Слушать сейчас
                                        </button>
                                    </div>
                                </div>
                                <div className="flex gap-4 overflow-x-auto pb-4">
                                    <TrackCard title="Nightcall" artist="Kavinsky" cover="https://images.unsplash.com/photo-1614613535308-eb5fbd3358da?w=300&h=300&fit=crop" delay={200} />
                                    <TrackCard title="Starboy" artist="The Weeknd" cover="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?w=300&h=300&fit=crop" delay={300} />
                                    <TrackCard title="Blinding Lights" artist="The Weeknd" cover="https://images.unsplash.com/photo-1470225620780-dba8m4880504?w=300&h=300&fit=crop" delay={400} />
                                </div>
                            </div>
                        </section>

                        {/* Library Section */}
                        <section>
                            <h3 className="text-2xl font-bold mb-6">Ваша библиотека</h3>
                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
                                <TrackCard title="Lo-fi Chill" artist="Study Beats" cover="https://images.unsplash.com/photo-1516280440614-379396ec4c5b?w=300&h=300&fit=crop" delay={500} />
                                <TrackCard title="Deep House" artist="Club Mix" cover="https://images.unsplash.com/photo-1459749411177-042180ce673c?w=300&h=300&fit=crop" delay={600} />
                                <TrackCard title="Techno Rave" artist="Berlin" cover="https://images.unsplash.com/photo-1514525253361-bee8a196765a?w=300&h=300&fit=crop" delay={700} />
                                <TrackCard title="Jazz Night" artist="Blue Note" cover="https://images.unsplash.com/photo-1511192336575-5a71f34f951d?w=300&h=300&fit=crop" delay={800} />
                                <TrackCard title="Rock Classics" artist="Legendary" cover="https://images.unsplash.com/photo-1498038432414-6524a53fa66a?w=300&h=300&fit=crop" delay={900} />
                                <TrackCard title="Ambient Air" artist="Space" cover="https://images.unsplash.com/photo-1508700115892-459865d29a9a?w=300&h=300&fit=crop" delay={1000} />
                            </div>
                        </section>
                    </main>

                    {/* Bottom Player */}
                    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-6xl gradient-border animate-spring" style={{ animationDelay: '1100ms' }}>
                        <div className="glass rounded-[23px] p-4 flex items-center justify-between px-8">
                            <div className="flex items-center gap-4 w-1/3">
                                <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3358da?w=100&h=100&fit=crop" className="w-12 h-12 rounded-lg shadow-lg" />
                                <div>
                                    <h4 className="font-bold text-sm">{currentTrack.title}</h4>
                                    <p className="text-xs text-gray-400">{currentTrack.artist}</p>
                                </div>
                                <Heart className="w-4 h-4 text-pink-500 ml-2 cursor-pointer hover-scale" />
                            </div>

                            <div className="flex flex-col items-center gap-2 w-1/3">
                                <div className="flex items-center gap-6">
                                    <Icon name="skip-back" className="cursor-pointer hover:text-indigo-400 transition-colors" />
                                    <div className="w-10 h-10 bg-white text-indigo-900 rounded-full flex items-center justify-center cursor-pointer hover-scale shadow-xl">
                                        <Icon name="play" className="fill-current w-5 h-5" />
                                    </div>
                                    <Icon name="skip-forward" className="cursor-pointer hover:text-indigo-400 transition-colors" />
                                </div>
                                <div className="w-full max-w-md h-1 bg-white/10 rounded-full overflow-hidden">
                                    <div className="w-1/3 h-full bg-gradient-to-r from-indigo-500 to-purple-500" />
                                </div>
                            </div>

                            <div className="flex items-center justify-end gap-4 w-1/3">
                                <Icon name="volume-2" className="w-5 h-5 text-gray-400" />
                                <div className="w-24 h-1 bg-white/10 rounded-full overflow-hidden">
                                    <div className="w-2/3 h-full bg-white/60" />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- Script to handle Lucide Icons manually since we are in React but without a bundler -->
    <script>
        // Helper to ensure icons are rendered after React updates
        const observer = new MutationObserver(() => {
            lucide.createIcons();
        });
        observer.observe(document.body, { childList: true, subtree: true });
    </script>
</body>
</html>
