<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SONUS | Ultra High-End Audio Experience</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-bg: #030303;
            --color-surface: rgba(18, 18, 18, 0.75);
            --color-surface-light: rgba(30, 30, 30, 0.65);
            --color-accent: #8b5cf6;
            --color-accent-glow: rgba(139, 92, 246, 0.3);
            --color-text-main: #ffffff;
            --color-text-secondary: #a1a1aa;
            --color-text-muted: #52525b;
            --color-border: rgba(255, 255, 255, 0.08);
            --radius-md: 12px;
            --radius-lg: 24px;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            cursor: default;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text-main);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* --- BACKGROUND --- */
        .liquid-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            filter: blur(100px);
            background: var(--color-bg);
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
            opacity: 0.4;
            animation: float-liquid infinite alternate;
        }
        .blob-1 { width: 60vw; height: 60vw; background: #3b0764; top: -10%; left: -10%; animation-duration: 25s; }
        .blob-2 { width: 50vw; height: 50vw; background: #1e3a8a; bottom: -10%; right: -10%; animation-duration: 30s; }
        .blob-3 { width: 40vw; height: 40vw; background: #581c87; top: 30%; left: 40%; animation-duration: 20s; }
        @keyframes float-liquid { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(10vw, 10vh) scale(1.2); } }
        .bg-dimmer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.45); z-index: -1; }

        /* --- LAYOUT --- */
        .app-container {
            display: grid;
            grid-template-columns: 260px 1fr;
            grid-template-rows: 1fr 110px;
            height: 100vh;
            position: relative;
        }

        .sidebar {
            background: var(--color-surface);
            -webkit-backdrop-filter: blur(60px);
            backdrop-filter: blur(60px);
            border-right: 1px solid var(--color-border);
            padding: 32px 20px;
            display: flex;
            flex-direction: column;
            gap: 48px;
            z-index: 10;
        }

        .brand { font-size: 20px; font-weight: 800; letter-spacing: -0.8px; padding-left: 12px; display: flex; align-items: center; gap: 8px; }
        .brand .dot { width: 6px; height: 6px; background: var(--color-accent); border-radius: 50%; }

        .nav-group { display: flex; flex-direction: column; gap: 8px; }
        .nav-label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--color-text-muted); letter-spacing: 1.2px; margin: 0 12px 12px; }
        .nav-link {
            text-decoration: none;
            color: var(--color-text-secondary);
            font-size: 14px;
            font-weight: 500;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            transition: var(--transition-smooth);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-link:hover { color: var(--color-text-main); background: var(--color-surface-light); }
        .nav-link.active { background: var(--color-accent); color: var(--color-text-main); box-shadow: 0 8px 20px var(--color-accent-glow); }

        .main-content { overflow-y: auto; padding: 0 40px 120px; scrollbar-width: none; }
        .main-content::-webkit-scrollbar { display: none; }

        .top-header {
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
        }

        .search-box {
            width: 380px;
            background: var(--color-surface-light);
            border: 1px solid var(--color-border);
            padding: 12px 20px;
            border-radius: 16px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: var(--transition-smooth);
        }
        .search-box:focus { border-color: var(--color-accent); background: var(--color-surface); }

        .profile-chip {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: var(--color-surface-light);
            border: 1px solid var(--color-border);
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }
        .profile-chip:hover { background: var(--color-surface); }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--color-accent), #c084fc); }

        /* --- AUTH PAGE --- */
        .auth-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
        }
        .auth-card {
            background: var(--color-surface);
            padding: 48px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            width: 400px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }
        .auth-card h2 { font-size: 28px; margin-bottom: 32px; font-weight: 800; }
        .auth-input {
            width: 100%;
            padding: 14px 20px;
            background: var(--color-surface-light);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            color: white;
            margin-bottom: 16px;
            outline: none;
            font-size: 14px;
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--color-accent);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
        }
        .auth-btn:hover { background: #a78bfa; transform: translateY(-2px); }

        /* --- PROFILE PAGE --- */
        .profile-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 32px;
            padding: 32px;
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            backdrop-filter: blur(20px);
        }
        .profile-avatar-lg {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-accent), #c084fc);
            box-shadow: 0 10px 30px var(--color-accent-glow);
        }
        .profile-info h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
        .profile-info p { color: var(--color-text-secondary); font-size: 16px; margin-bottom: 16px; }
        .profile-badge {
            display: inline-block;
            padding: 6px 12px;
            background: var(--color-accent);
            font-size: 12px;
            font-weight: 700;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
        }
        .stat-card {
            background: var(--color-surface);
            padding: 24px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            text-align: center;
            transition: var(--transition-smooth);
        }
        .stat-card:hover { background: var(--color-surface-light); transform: translateY(-5px); }
        .stat-value { font-size: 32px; font-weight: 800; color: var(--color-accent); margin-bottom: 8px; }
        .stat-label { font-size: 14px; color: var(--color-text-secondary); }

        /* --- TRACK LIST (REUSED) --- */
        .track-list-header {
            display: grid;
            grid-template-columns: 40px 1fr 200px 150px 80px;
            padding: 0 16px 8px;
            color: var(--color-text-muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .track-row {
            display: grid;
            grid-template-columns: 40px 1fr 200px 150px 80px;
            align-items: center;
            padding: 8px 16px;
            border-radius: var(--radius-md);
            transition: var(--transition-smooth);
            cursor: pointer;
            gap: 16px;
        }
        .track-row:hover { background: var(--color-surface-light); }
        .track-main { display: flex; align-items: center; gap: 12px; }
        .track-thumb { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; }
        .track-details .title { font-size: 14px; font-weight: 500; color: var(--color-text-main); }
        .track-details .artist { font-size: 13px; color: var(--color-text-secondary); }

        /* --- PLAYER BAR --- */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 110px;
            background: var(--player-bg);
            -webkit-backdrop-filter: blur(30px);
            backdrop-filter: blur(30px);
            border-top: 1px solid var(--color-border);
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            align-items: center;
            padding: 0 24px;
            z-index: 1000;
        }
        .player-now-playing { display: flex; align-items: center; gap: 16px; }
        .track-art-container { width: 64px; height: 64px; border-radius: 12px; overflow: hidden; }
        .track-art { width: 100%; height: 100%; object-fit: cover; }
        .track-info { display: flex; flex-direction: column; gap: 4px; }
        .track-title { font-size: 14px; font-weight: 600; color: white; }
        .track-artist { font-size: 12px; color: var(--color-text-secondary); }
        .player-controls { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .control-buttons { display: flex; align-items: center; gap: 24px; }
        .play-pause-btn { width: 44px; height: 44px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition-smooth); }
        .play-pause-btn:hover { transform: scale(1.1); background: var(--color-accent); }
        .play-pause-btn svg { fill: black; transition: var(--transition-smooth); }
        .play-pause-btn:hover svg { fill: white; }
        .timeline-container { width: 100%; max-width: 600px; display: flex; align-items: center; gap: 12px; }
        .progress-slider { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; position: relative; cursor: pointer; }
        .progress-fill { position: absolute; top: 0; left: 0; height: 100%; width: 35%; background: var(--color-accent); border-radius: 2px; }
        .time-stamp { font-size: 11px; color: var(--color-text-secondary); min-width: 35px; }
        .player-system { display: flex; align-items: center; justify-content: flex-end; gap: 16px; }
        .volume-container { display: flex; align-items: center; gap: 10px; width: 140px; }
        .vol-slider { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; position: relative; }
        .vol-fill { position: absolute; top: 0; left: 0; height: 100%; width: 70%; background: var(--color-text-secondary); border-radius: 2px; }

        .reveal { animation: fadeInUp 0.8s cubic-bezier(0.2, 1, 0.3, 1) forwards; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="initApp()">

<div class="liquid-canvas">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>
<div class="bg-dimmer"></div>

<!-- Страница входа -->
<div id="auth-page" class="auth-page">
    <div class="auth-card">
        <h2>Добро пожаловать</h2>
        <input type="text" class="auth-input" placeholder="Логин или Email" id="auth-user">
        <input type="password" class="auth-input" placeholder="Пароль">
        <button class="auth-btn" onclick="handleLogin()">Войти в систему</button>
    </div>
</div>

<div class="app-container">
    <aside class="sidebar">
        <div class="brand">SONUS<div class="dot"></div></div>
        <div class="nav-group">
            <div class="nav-label">Меню</div>
            <a class="nav-link active" onclick="switchTab(this, 'home')">Главная</a>
            <a class="nav-link" onclick="switchTab(this, 'explore')">Обзор</a>
            <a class="nav-link" onclick="switchTab(this, 'library')">Библиотека</a>
        </div>
        <div class="nav-group">
            <div class="nav-label">Личное</div>
            <a class="nav-link" onclick="openProfile()">Мой профиль</a>
            <a class="nav-link" onclick="handleLogout()">Выйти</a>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-header">
            <input type="text" class="search-box" placeholder="Поиск музыки..." oninput="filterMusic()">
            <div class="profile-chip" onclick="openProfile()">
                <div class="avatar"></div>
                <div style="text-align: right">
                    <div style="font-size: 13px; font-weight: 600;" id="user-name-display">Александр В.</div>
                    <div style="font-size: 10px; color: var(--color-text-muted);">Ultra HD Plan</div>
                </div>
            </div>
        </div>

        <div id="page-content">
            <!-- Контент будет меняться динамически -->
        </div>
    </main>

    <footer class="player-bar">
        <div class="player-now-playing">
            <div class="track-art-container">
                <img src="https://images.unsplash.com/photo-1614613535308-a7f079df21f5?w=100" class="track-art" id="player-art">
            </div>
            <div class="track-info">
                <div class="track-title" id="player-title">Выберите трек</div>
                <div class="track-artist" id="player-artist">Слушайте в высоком качестве</div>
            </div>
        </div>

        <div class="player-controls">
            <div class="control-buttons">
                <button class="btn-transport">⏮</button>
                <div class="play-pause-btn" id="playBtn">
                    <svg id="playIcon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                </div>
                <button class="btn-transport">⏭</button>
            </div>
            <div class="timeline-container">
                <span class="time-stamp" id="curr-time">0:00</span>
                <div class="progress-slider" onclick="seek(event)">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <span class="time-stamp" id="dur-time">0:00</span>
            </div>
        </div>

        <div class="player-system">
            <div class="volume-container">
                <button class="btn-transport">🔊</button>
                <div class="vol-slider"><div class="vol-fill"></div></div>
            </div>
        </div>
    </footer>
</div>

<script>
    // Состояние приложения
    const state = {
        isLoggedIn: false,
        currentUser: {
            name: "Александр В.",
            plan: "Ultra HD Plan",
            stats: {
                tracksPlayed: "1,248",
                timeListened: "342 ч",
                topGenre: "Synthwave"
            },
            recentTracks: [
                { title: "After Hours", artist: "The Weeknd", album: "After Hours", date: "Вчера", duration: "6:01", img: "https://images.unsplash.com/photo-1614613535308-a7f079df21f5?w=100" },
                { title: "Solaris", artist: "FKJ", album: "Solis", date: "2 дня назад", duration: "4:20", img: "https://images.unsplash.com/photo-1459749411177-041224656704?w=100" }
            ]
        }
    };

    const musicDB = [
        { id: 1, title: "After Hours", artist: "The Weeknd", album: "After Hours", date: "2 окт 2023", duration: "6:01", img: "https://images.unsplash.com/photo-1614613535308-a7f079df21f5?w=100" },
        { id: 2, title: "Solaris", artist: "FKJ", album: "Solis", date: "15 сен 2023", duration: "4:20", img: "https://images.unsplash.com/photo-1459749411177-041224656704?w=100" },
        { id: 3, title: "Neon Nights", artist: "Kavinsky", album: "OutRun", date: "11 авг 2023", duration: "3:45", img: "https://images.unsplash.com/photo-1493225255267-535b69a5a7a9?w=100" },
    ];

    function initApp() {
        if (!state.isLoggedIn) {
            document.getElementById('auth-page').style.display = 'flex';
        } else {
            document.getElementById('auth-page').style.display = 'none';
            renderHome();
        }
    }

    function handleLogin() {
        const userName = document.getElementById('auth-user').value || "Пользователь";
        state.isLoggedIn = true;
        state.currentUser.name = userName;
        document.getElementById('user-name-display').innerText = userName;
        document.getElementById('auth-page').style.display = 'none';
        renderHome();
    }

    function handleLogout() {
        state.isLoggedIn = false;
        document.getElementById('auth-page').style.display = 'flex';
    }

    function renderHome() {
        const content = document.getElementById('page-content');
        content.innerHTML = `
            <div class="section-label reveal">Популярное сейчас</div>
            <div class="track-list-header reveal" style="animation-delay: 0.1s;">
                <div style="width: 20px;">№</div><div>Трек</div><div>Альбом</div><div>Дата</div><div style="text-align: right;">⏳</div>
            </div>
            <div id="music-list"></div>
        `;
        renderMusic(musicDB);
    }

    function openProfile() {
        const content = document.getElementById('page-content');
        const user = state.currentUser;
        
        content.innerHTML = `
            <div class="profile-container reveal">
                <div class="profile-header">
                    <div class="profile-avatar-lg"></div>
                    <div class="profile-info">
                        <h1>${user.name}</h1>
                        <p>Меломан с 2018 года. Обожаю глубокие басы и ночной город.</p>
                        <div class="profile-badge">${user.plan}</div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${user.stats.tracksPlayed}</div>
                        <div class="stat-label">Треков прослушано</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${user.stats.timeListened}</div>
                        <div class="stat-label">Всего времени</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${user.stats.topGenre}</div>
                        <div class="stat-label">Любимый жанр</div>
                    </div>
                </div>

                <div>
                    <div class="section-label" style="margin-bottom: 24px;">Недавно прослушано</div>
                    <div class="track-list-header">
                        <div style="width: 20px;">№</div><div>Трек</div><div>Альбом</div><div>Дата</div><div style="text-align: right;">⏳</div>
                    </div>
                    <div id="recent-list"></div>
                </div>
            </div>
        `;
        renderMusic(user.recentTracks, 'recent-list');
    }

    function renderMusic(data, containerId = 'music-list') {
        const list = document.getElementById(containerId);
        list.innerHTML = data.map((track, index) => `
            <div class="track-row reveal" style="animation-delay: ${0.2 + (index * 0.05)}s" onclick="playTrack(${track.id || index})">
                <div class="track-number">${index + 1}</div>
                <div class="track-main">
                    <img src="${track.img}" class="track-thumb">
                    <div class="track-details">
                        <div class="title">${track.title}</div>
                        <div class="artist">${track.artist}</div>
                    </div>
                </div>
                <div class="track-album">${track.album}</div>
                <div class="track-date">${track.date}</div>
                <div class="track-duration">${track.duration}</div>
            </div>
        `).join('');
    }

    function playTrack(id) {
        const track = musicDB.find(t => t.id === id) || musicDB[0];
        document.getElementById('player-art').src = track.img;
        document.getElementById('player-title').innerText = track.title;
        document.getElementById('player-artist').innerText = track.artist;
        updatePlayButton(true);
    }

    function updatePlayButton(playing) {
        const icon = document.getElementById('playIcon');
        icon.innerHTML = playing ? '<path d="M6 19h2V5h-2v14zm8 0h2V5h-2v14z"/>' : '<path d="M8 5v14l11-7z"/>';
    }

    function switchTab(el, tab) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        if(tab === 'home') renderHome();
        else if(tab === 'profile') openProfile();
        else {
            document.getElementById('page-content').innerHTML = `<div class="reveal" style="text-align:center; margin-top: 120px;"><h1>${tab}</h1><p>В разработке</p></div>`;
        }
    }

    document.getElementById('playBtn').onclick = () => {
        const isPlaying = document.getElementById('playIcon').innerHTML.includes('M6');
        updatePlayButton(!isPlaying);
    };

    window.onload = initApp;
</script>
</body>
</html>
