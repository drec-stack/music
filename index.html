<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SONUS | Universal High-End Audio</title>
    
    <!-- Подключение шрифта с оптимизацией для всех ОС -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* Переменные дизайна с поддержкой fallback */
        :root {
            --color-bg: #030303;
            --color-surface: rgba(18, 18, 18, 0.75);
            --color-surface-light: rgba(30, 30, 30, 0.65);
            --color-accent: #8b5cf6;
            --color-accent-glow: rgba(139, 92, 246, 0.3);
            --color-text-main: #ffffff;
            --color-text-secondary: #a1a1aa;
            --color-text-muted: #71717a;
            --color-border: rgba(255, 255, 255, 0.08);
            
            --radius-md: 12px;
            --radius-lg: 24px;
            --transition-smooth: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        /* Обнуление и базовые настройки для всех браузеров */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            cursor: default;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text-main);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* --- КРОСС-БРАУЗЕРНЫЙ ЖИДКИЙ ФОН --- */
        .liquid-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            filter: blur(80px);
            -webkit-filter: blur(80px); /* Для старых Safari */
            background: var(--color-bg);
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
            opacity: 0.5;
            will-change: transform; /* Оптимизация для GPU */
            animation: float-liquid infinite alternate;
        }

        .blob-1 { width: 60vw; height: 60vw; background: #3b0764; top: -10%; left: -10%; animation-duration: 25s; }
        .blob-2 { width: 50vw; height: 50vw; background: #1e3a8a; bottom: -10%; right: -10%; animation-duration: 30s; animation-delay: -5s; }
        .blob-3 { width: 40vw; height: 40vw; background: #581c87; top: 30%; left: 40%; animation-duration: 20s; animation-delay: -2s; }

        @keyframes float-liquid {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(10vw, 10vh) scale(1.1); }
            66% { transform: translate(-5vw, 20vh) scale(0.9); }
            100% { transform: translate(5vw, -5vh) scale(1.2); }
        }

        .bg-dimmer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: -1;
            pointer-events: none;
        }

        /* --- СТРУКТУРА ПРИЛОЖЕНИЯ --- */
        .app-container {
            display: grid;
            grid-template-columns: 260px 1fr;
            grid-template-rows: 1fr 100px;
            height: 100vh;
            position: relative;
        }

        /* Sidebar с поддержкой всех браузеров */
        .sidebar {
            background: var(--color-surface);
            -webkit-backdrop-filter: blur(60px);
            backdrop-filter: blur(60px);
            border-right: 1px solid var(--color-border);
            padding: 32px 20px;
            display: flex;
            flex-direction: column;
            gap: 48px;
            z-index: 10;
        }

        .brand {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.8px;
            padding-left: 12px;
            color: var(--color-text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .brand .dot { width: 6px; height: 6px; background: var(--color-accent); border-radius: 50%; }

        .nav-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--color-text-muted);
            letter-spacing: 1.2px;
            margin: 0 12px 12px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--color-text-secondary);
            font-size: 14px;
            font-weight: 500;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            transition: var(--transition-smooth);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-link:hover {
            color: var(--color-text-main);
            background: var(--color-surface-light);
        }

        .nav-link.active {
            background: var(--color-accent);
            color: var(--color-text-main);
            box-shadow: 0 8px 20px var(--color-accent-glow);
        }

        /* Основной контент */
        .main-content {
            overflow-y: auto;
            padding: 0 40px 110px;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
        }
        .main-content::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .top-header {
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
        }

        .search-box {
            width: 380px;
            background: var(--color-surface-light);
            border: 1px solid var(--color-border);
            padding: 12px 20px;
            border-radius: 16px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: var(--transition-smooth);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
        }

        .search-box:focus {
            border-color: var(--color-accent);
            background: var(--color-surface);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        .profile-chip {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: var(--color-surface-light);
            border: 1px solid var(--color-border);
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition-smooth);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-accent), #c084fc);
        }

        /* Hero-баннер */
        .hero-banner {
            height: 300px;
            border-radius: var(--radius-lg);
            background: linear-gradient(to right, rgba(0,0,0,0.9), transparent), 
                        url('https://images.unsplash.com/photo-1493225255267-535b69a5a7a9?w=1200');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 48px;
            margin-bottom: 48px;
            border: 1px solid var(--color-border);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .hero-title {
            font-size: 48px;
            font-weight: 800;
            max-width: 600px;
            line-height: 1.1;
            margin-bottom: 24px;
            letter-spacing: -1px;
        }

        .hero-btn {
            width: fit-content;
            padding: 16px 32px;
            background: white;
            color: black;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .hero-btn:hover { transform: scale(1.05); background: var(--color-accent); color: white; }

        /* Сетка музыки */
        .section-label {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
        }

        .track-card {
            background: var(--color-surface);
            padding: 24px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            transition: var(--transition-smooth);
            cursor: pointer;
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            position: relative;
        }

        .track-card:hover {
            background: var(--color-surface-light);
            transform: translateY(-10px);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .img-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .track-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition-smooth);
        }

        .track-card:hover .track-img { transform: scale(1.1); }

        .play-btn-mini {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 44px;
            height: 44px;
            background: var(--color-accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(10px);
            transition: var(--transition-smooth);
            box-shadow: 0 4px 12px var(--color-accent-glow);
        }

        .track-card:hover .play-btn-mini { opacity: 1; transform: translateY(0); }

        .track-info h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
        .track-info p { font-size: 14px; color: var(--color-text-secondary); }

        /* --- ПРЕМИУМ ПЛЕЕР --- */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100px;
            background: rgba(10, 10, 10, 0.85);
            -webkit-backdrop-filter: blur(40px);
            backdrop-filter: blur(40px);
            border-top: 1px solid var(--color-border);
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            align-items: center;
            padding: 0 32px;
            z-index: 1000;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .now-img {
            width: 60px;
            height: 60px;
            border-radius: var(--radius-md);
            object-fit: cover;
        }

        .now-details h4 { font-size: 14px; font-weight: 600; }
        .now-details p { font-size: 12px; color: var(--color-text-secondary); }

        .controls-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .playback-btns {
            display: flex;
            align-items: center;
            gap: 28px;
        }

        .btn-ctrl {
            background: none;
            border: none;
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: var(--transition-smooth);
            font-size: 20px;
        }

        .btn-ctrl:hover { color: var(--color-text-main); }

        .btn-main-play {
            width: 48px;
            height: 48px;
            background: white;
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition-smooth);
            border: none;
        }

        .btn-main-play:hover { transform: scale(1.1); background: var(--color-accent); color: white; }

        .progress-wrap {
            width: 480px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-track {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            width: 40%;
            height: 100%;
            background: var(--color-accent);
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        .time-stamp { font-size: 11px; color: var(--color-text-muted); font-weight: 500; }

        .volume-ctrl {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
        }

        .vol-bar {
            width: 90px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        .vol-fill { width: 60%; height: 100%; background: var(--color-text-secondary); border-radius: 2px; }

        /* Анимация появления */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal { 
            animation: fadeInUp 0.8s cubic-bezier(0.2, 1, 0.3, 1) forwards; 
            opacity: 0;
        }

    </style>
</head>
<body>

<!-- Жидкий фон -->
<div class="liquid-canvas">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>
<div class="bg-dimmer"></div>

<div class="app-container">
    <!-- Боковая панель -->
    <aside class="sidebar">
        <div class="brand">SONUS<div class="dot"></div></div>
        
        <div class="nav-group">
            <div class="nav-label">Меню</div>
            <a class="nav-link active" onclick="switchTab(this, 'home')">Главная</a>
            <a class="nav-link" onclick="switchTab(this, 'explore')">Обзор</a>
            <a class="nav-link" onclick="switchTab(this, 'library')">Библиотека</a>
        </div>

        <div class="nav-group">
            <div class="nav-label">Коллекции</div>
            <a class="nav-link">Ночной город</a>
            <a class="nav-link">Deep Focus</a>
            <a class="nav-link">Synthwave 84</a>
            <a class="nav-link">Lo-Fi Study</a>
        </div>
    </aside>

    <!-- Основная область -->
    <main class="main-content">
        <div class="top-header">
            <input type="text" class="search-box" placeholder="Поиск по всей библиотеке..." oninput="filterMusic()">
            <div class="profile-chip">
                <div class="avatar"></div>
                <div style="text-align: right">
                    <div style="font-size: 13px; font-weight: 600;">Александр В.</div>
                    <div style="font-size: 10px; color: var(--color-text-muted);">Ultra HD Plan</div>
                </div>
            </div>
        </div>

        <div id="page-content">
            <div class="hero-banner reveal">
                <div style="font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--color-accent); margin-bottom: 12px; letter-spacing: 1px;">Premium Selection</div>
                <h1 class="hero-title">Новый стандарт <br>цифрового звучания</h1>
                <div class="hero-btn">Начать прослушивание</div>
            </div>

            <div class="section-label reveal" style="animation-delay: 0.1s;">Популярное сейчас</div>
            <div class="music-grid" id="music-grid">
                <!-- Генерация через JS -->
            </div>
        </div>
    </main>

    <!-- Плеер -->
    <footer class="player-bar">
        <div class="now-playing">
            <img src="" class="now-img" id="now-img">
            <div class="now-details">
                <h4 id="now-title">Выберите трек</h4>
                <p id="now-artist">Слушайте в высоком качестве</p>
            </div>
        </div>

        <div class="controls-center">
            <div class="playback-btns">
                <button class="btn-ctrl">⏮</button>
                <button class="btn-main-play" id="play-btn" onclick="togglePlay()">▶</button>
                <button class="btn-ctrl">⏭</button>
            </div>
            <div class="progress-wrap">
                <span class="time-stamp" id="curr-time">0:00</span>
                <div class="progress-track" onclick="seek(event)">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <span class="time-stamp" id="dur-time">0:00</span>
            </div>
        </div>

        <div class="volume-ctrl">
            <button class="btn-ctrl" style="font-size: 16px;">🔊</button>
            <div class="vol-bar">
                <div class="vol-fill"></div>
            </div>
        </div>
    </footer>
</div>

<script>
    // База данных треков
    const musicDB = [
        { id: 1, title: "After Hours", artist: "The Weeknd", img: "https://images.unsplash.com/photo-1614613535308-a7f079df21f5?w=300" },
        { id: 2, title: "Solaris", artist: "FKJ", img: "https://images.unsplash.com/photo-1459749411177-041224656704?w=300" },
        { id: 3, title: "Neon Nights", artist: "Kavinsky", img: "https://images.unsplash.com/photo-1493225255267-535b69a5a7a9?w=300" },
        { id: 4, title: "Quiet Morning", artist: "Hozier", img: "https://images.unsplash.com/photo-1514525231468-155d17a27aee?w=300" },
        { id: 5, title: "Electric Love", artist: "Dua Lipa", img: "https://images.unsplash.com/photo-1508718860336-f75bc6f52212?w=300" },
        { id: 6, title: "Deep Blue", artist: "Ambient Soul", img: "https://images.unsplash.com/photo-1511671782729-a0fb7a95bac7?w=300" },
        { id: 7, title: "Urban Pulse", artist: "Kaytranada", img: "https://images.unsplash.com/photo-1470225620780-dba4eeb65739?w=300" },
        { id: 8, title: "Velvet Rain", artist: "Lana Del Rey", img: "https://images.unsplash.com/photo-1505740420996-2002ff3e3ad1?w=300" },
    ];

    let isPlaying = false;
    let timer = null;
    let timeSeconds = 0;

    function init() {
        renderMusic(musicDB);
    }

    function renderMusic(data) {
        const grid = document.getElementById('music-grid');
        grid.innerHTML = data.map((track, index) => `
            <div class="track-card reveal" style="animation-delay: ${0.2 + (index * 0.05)}s" onclick="playTrack(${track.id})">
                <div class="img-wrapper">
                    <img src="${track.img}" class="track-img">
                    <div class="play-btn-mini">▶</div>
                </div>
                <div class="track-info">
                    <h3>${track.title}</h3>
                    <p>${track.artist}</p>
                </div>
            </div>
        `).join('');
    }

    function filterMusic() {
        const query = document.querySelector('.search-box').value.toLowerCase();
        const filtered = musicDB.filter(t => t.title.toLowerCase().includes(query) || t.artist.toLowerCase().includes(query));
        renderMusic(filtered);
    }

    function playTrack(id) {
        const track = musicDB.find(t => t.id === id);
        document.getElementById('now-img').src = track.img;
        document.getElementById('now-title').innerText = track.title;
        document.getElementById('now-artist').innerText = track.artist;
        isPlaying = true;
        document.getElementById('play-btn').innerText = '⏸';
        startTimer();
    }

    function togglePlay() {
        isPlaying = !isPlaying;
        document.getElementById('play-btn').innerText = isPlaying ? '⏸' : '▶';
        if(!isPlaying) clearInterval(timer);
        else startTimer();
    }

    function startTimer() {
        clearInterval(timer);
        timer = setInterval(() => {
            timeSeconds++;
            updateProgress();
        }, 1000);
    }

    function updateProgress() {
        const duration = 210;
        const percent = (timeSeconds / duration) * 100;
        document.getElementById('progress-fill').style.width = `${percent}%`;
        const m = Math.floor(timeSeconds / 60);
        const s = timeSeconds % 60;
        document.getElementById('curr-time').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        document.getElementById('dur-time').innerText = `3:30`;
    }

    function seek(e) {
        const rect = e.target.getBoundingClientRect();
        timeSeconds = Math.floor(((e.clientX - rect.left) / rect.width) * 210);
        updateProgress();
    }

    function switchTab(el, tab) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        const content = document.getElementById('page-content');
        if(tab !== 'home') {
            content.innerHTML = `<div class="reveal" style="text-align:center; margin-top: 120px;">
                <h1 style="font-size: 32px; margin-bottom: 12px;">${tab === 'explore' ? 'Исследование' : 'Библиотека'}</h1>
                <p style="color: var(--color-text-secondary);">Данный модуль находится в стадии разработки</p>
            </div>`;
        } else {
            location.reload();
        }
    }

    window.onload = init;
</script>
</body>
</html>
